spring.application.name=backend-fredo

# PostgreSQL config
spring.datasource.url=jdbc:postgresql://centerbeam.proxy.rlwy.net:11367/railway
spring.datasource.username=postgres
spring.datasource.password=KjZlvibmWesSPBNstnIAKKWJTZsfOShg
spring.jpa.hibernate.ddl-auto=update

# SQL logni o'chirish (xotira tejash)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP — connection pool (xotira va ulanish nazorati)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA lazy loading va cache optimallashtirish
spring.jpa.open-in-view=false

# Server port
server.port=8080

# Multipart (Word fayl upload uchun limit)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
JAVA_TOOL_OPTIONS = -Xmx256m -Xms64m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
